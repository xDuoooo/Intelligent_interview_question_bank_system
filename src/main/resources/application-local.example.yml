# application-local.yml 模板文件
# 使用方式：
# 1. 复制一份为 application-local.yml
# 2. 将数据库、Redis、ES、OAuth 等值改成你本机实际配置
# 3. application-local.yml 已在 .gitignore 中，不会被误提交
# 4. local 即开发环境

# 本地服务启动地址
server:
  address: 0.0.0.0
  port: ${SERVER_PORT:8101}

spring:
  # 本地开发开启热重启
  devtools:
    restart:
      enabled: true
  # 本地数据库连接
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/Intelligent_interview_question_bank_system?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai
    username: root
    password: your_db_password
  # 本地 Redis 连接
  data:
    redis:
      database: 0
      host: localhost
      port: 6379
      timeout: 5000
      password: your_redis_password
  # 本地 Elasticsearch 连接
  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: your_es_password
  # Spring Cloud 本地联调配置
  cloud:
    nacos:
      discovery:
        enabled: false
        server-addr: 127.0.0.1:8848
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            refresh: true
    sentinel:
      enabled: false
      transport:
        dashboard: localhost:8138
  # 通过 Spring Config 导入 Nacos 远程配置
  config:
    import:
      - optional:nacos:Intelligent-interview-question-bank-system.yml

# 本地开发建议开启 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 本地黑名单配置来源
nacos:
  config:
    data-id: black-ip-list.yml
    group: DEFAULT_GROUP

# 腾讯云 COS 配置
cos:
  client:
    accessKey: your_cos_access_key
    secretKey: your_cos_secret_key
    region: ap-beijing
    bucket: your_cos_bucket
    # 如有自定义 CDN / COS 访问域名可填写；留空时会按 bucket + region 推导默认地址
    host: https://your-bucket.cos.ap-beijing.myqcloud.com

# 本地保留接口文档
knife4j:
  enable: true

# 腾讯云短信配置
tencent:
  email:
    secretId: your_tencent_email_secret_id
    secretKey: your_tencent_email_secret_key
    region: ap-guangzhou
    fromEmailAddress: notice@example.com
    replyToAddresses: ""
    verificationTemplateId: your_tencent_email_verification_template_id
    learningReminderTemplateId: ""
  sms:
    secretId: your_tencent_sms_secret_id
    secretKey: your_tencent_sms_secret_key
    sdkAppId: your_tencent_sms_sdk_app_id
    signName: 智面平台
    templateId: your_tencent_sms_template_id
    region: ap-guangzhou
    countryCode: +86

# 第三方登录本地配置
social:
  github:
    id: your_github_client_id
    secret: your_github_client_secret
    redirect-uri: http://localhost:8101/api/user/login/github/callback
  gitee:
    id: your_gitee_client_id
    secret: your_gitee_client_secret
    redirect-uri: http://localhost:8101/api/user/login/gitee/callback
  google:
    id: your_google_client_id
    secret: your_google_client_secret
    redirect-uri: http://localhost:8101/api/user/login/google/callback

# AI 模型本地配置
ai:
  # 本地开发使用的模型服务密钥
  api-key: your_ai_api_key
  # 模型服务地址
  host: https://api.deepseek.com/v1
  # 默认模型名称
  model: deepseek-chat
  # 语音转写模型（需兼容 OpenAI audio/transcriptions 协议）
  speech-model: whisper-1

# 前端联调地址
app:
  frontend-url: http://localhost:3000
  email:
    # 本地开发建议默认开启模拟发信，避免误发真实邮件
    mock-enabled: true
  cors:
    # 多个来源可用英文逗号分隔；本地如只跑一个前端端口，可直接复用 frontend-url
    allowed-origin-patterns: http://localhost:3000,http://127.0.0.1:3000
  sms:
    # 本地允许短信模拟发送，便于联调验证码流程
    mock-enabled: true
  ip-location:
    # 本地调试“按 IP 自动识别城市”时，可临时指定一个模拟城市（需是系统支持的城市）
    dev-city: 杭州
  upload:
    # 本地允许在未配置 COS 时回退到项目根目录 uploads/
    local-fallback-enabled: true
    local-dir: ${user.dir}/uploads
  es-sync:
    compensation:
      # 建议保持开启；这样写 MySQL 成功但写 ES 失败时，会落补偿任务并自动重试
      enabled: true
      fixed-rate-ms: 60000
      batch-size: 200
    question:
      # 建议默认关闭；若想让题目 ES 同步有定时兜底，可改为 true
      incremental-enabled: false
      full-sync-on-start: false
      incremental-fixed-rate-ms: 60000
      incremental-lookback-minutes: 5
    post:
      # 建议默认关闭；若想让帖子 ES 同步有定时兜底，可改为 true
      incremental-enabled: false
      full-sync-on-start: false
      incremental-fixed-rate-ms: 60000
      incremental-lookback-minutes: 5
