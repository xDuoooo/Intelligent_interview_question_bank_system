# 生产环境配置文件
# 说明：这里放生产环境连接信息、回调地址、日志级别等环境相关配置

# 生产环境服务地址
server:
  address: 0.0.0.0
  port: 8101
spring:
  # 生产环境关闭热重启
  devtools:
    restart:
      enabled: false
  # 生产环境数据库连接
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
  # 生产环境 Redis 连接
  data:
    redis:
      database: ${REDIS_DATABASE:1}
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      timeout: 5000
      password: ${REDIS_PASSWORD:}
  # 生产环境 Elasticsearch 连接
  elasticsearch:
    uris: ${ES_URIS:}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
  # 生产环境邮件发送配置
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:auto-sender@example.com}
    password: ${MAIL_PASSWORD:}
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
  # 生产环境 Spring Cloud 配置
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_DISCOVERY_SERVER_ADDR:}
      config:
        server-addr: ${NACOS_CONFIG_SERVER_ADDR:}
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            refresh: true
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:}
  # 生产环境远程配置导入
  config:
    import:
      - optional:nacos:Intelligent-interview-question-bank-system.yml

# 生产环境 SQL 日志策略
mybatis-plus:
  configuration:
    # 生产环境关闭日志
    log-impl: ''

# 生产环境黑名单配置来源
nacos:
  config:
    data-id: ${NACOS_BLACKLIST_DATA_ID:black-ip-list.yml}
    group: ${NACOS_BLACKLIST_GROUP:DEFAULT_GROUP}

# 生产环境 COS 配置
cos:
  client:
    accessKey: ${COS_ACCESS_KEY:xxx}
    secretKey: ${COS_SECRET_KEY:xxx}
    region: ${COS_REGION:ap-beijing}
    bucket: ${COS_BUCKET:xxx}
    host: ${COS_HOST:}

# 生产环境短信配置
aliyun:
  sms:
    accessKeyId: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    accessKeySecret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    signName: ${ALIYUN_SMS_SIGN_NAME:智面平台}
    templateCode: ${ALIYUN_SMS_TEMPLATE_CODE:SMS_xxxxxxx}

# 生产环境第三方登录配置
social:
  github:
    id: ${GITHUB_CLIENT_ID:}
    secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:}
  gitee:
    id: ${GITEE_CLIENT_ID:}
    secret: ${GITEE_CLIENT_SECRET:}
    redirect-uri: ${GITEE_REDIRECT_URI:}
  google:
    id: ${GOOGLE_CLIENT_ID:}
    secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:}

# 生产环境 AI 配置
ai:
  api-key: ${AI_API_KEY:}
  host: ${AI_HOST:https://api.deepseek.com/v1}
  model: ${AI_MODEL:deepseek-chat}
  speech-model: ${AI_SPEECH_MODEL:whisper-1}

# 生产环境前端地址
app:
  frontend-url: ${FRONTEND_URL:}
  sms:
    # 生产环境严禁短信“假发送”
    mock-enabled: false
  upload:
    # 生产环境默认关闭本地上传兜底，避免误把文件写到应用机器磁盘
    local-fallback-enabled: false

# 生产环境接口文档与鉴权
knife4j:
  enable: ${KNIFE4J_ENABLE:false}
  basic:
    enable: ${KNIFE4J_BASIC_ENABLE:false}
    username: ${KNIFE4J_USERNAME:}
    password: ${KNIFE4J_PASSWORD:}
