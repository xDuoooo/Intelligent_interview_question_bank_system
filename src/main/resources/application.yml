# 公共配置文件

spring:
  application:
    name: Intelligent-interview-question-bank-system
  devtools:
    restart:
      enabled: false
  # 默认 dev 环境
  profiles:
    active: dev
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 配置
  session:
    # todo 取消注释开启分布式 session（须先配置 Redis）
    # store-type: redis
    # 30 天过期
    timeout: 2592000
  # 数据库配置
  # todo 需替换配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/Intelligent_interview_question_bank_system}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root123456}
  # Redis 配置
  data:
    redis:
      database: 0
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000
      password: ${REDIS_PASSWORD:redis123}
  lettuce:
    pool:
      # 连接池最大连接数
      max-active: 200
      # 连接池最大阻塞等待时间（使用负值表示没有限制）
      max-wait: -1ms
      # 连接池中的最大空闲连接
      max-idle: 10
      # 连接池中的最小空闲连接
      min-idle: 0
  # 邮件服务配置
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:auto-sender@example.com}
    password: ${MAIL_PASSWORD:}
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

  # Elasticsearch 配置
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:}
  # 文件上传
  servlet:
    multipart:
      # 单个文件限制
      max-file-size: 2MB
      # 单次请求总限制
      max-request-size: 4MB
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            refresh: true
    sentinel:
      transport:
        dashboard: localhost:8138
  # Spring Boot 3 推荐使用这种方式导入 Nacos 配置
  config:
    import:
      - optional:nacos:Intelligent-interview-question-bank-system.yml

# 自定义 Nacos 配置属性（给 NacosListener 使用）
nacos:
  config:
    data-id: black-ip-list.yml
    group: DEFAULT_GROUP
server:
  address: 0.0.0.0
  port: 8101
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
# 对象存储
# todo 需替换配置
cos:
  client:
    accessKey: ${COS_ACCESS_KEY:xxx}
    secretKey: ${COS_SECRET_KEY:xxx}
    region: ${COS_REGION:xxx}
    bucket: ${COS_BUCKET:xxx}
# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.xduo.springbootinit.controller
# Sa-Token 配置
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: zhimian
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录（为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: false
  # 在登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: true
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true
# 阿里云短信配置
aliyun:
  sms:
    accessKeyId: your_access_key_id
    accessKeySecret: your_access_key_secret
    signName: 智面平台
    templateCode: SMS_xxxxxxx
# 社交登录配置
# 社交登录配置
social:
  github:
    id: ${GITHUB_CLIENT_ID:}
    secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8101/api/user/login/github/callback}
  gitee:
    id: ${GITEE_CLIENT_ID:}
    secret: ${GITEE_CLIENT_SECRET:}
    redirect-uri: ${GITEE_REDIRECT_URI:http://localhost:8101/api/user/login/gitee/callback}
  google:
    id: ${GOOGLE_CLIENT_ID:}
    secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8101/api/user/login/google/callback}
# AI 配置
ai:
  api-key: ${AI_API_KEY:}
  host: ${AI_HOST:https://api.deepseek.com/v1}
  model: ${AI_MODEL:deepseek-chat}
