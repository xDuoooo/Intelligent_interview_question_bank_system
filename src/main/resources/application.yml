# 公共配置文件
# 说明：
# 1. 这里只放所有环境都通用的基础配置
# 2. 不要在这里放数据库、Redis、ES、邮件、第三方登录回调等强环境相关信息
# 3. 环境相关配置分别放到 application-local.yml / application-test.yml / application-prod.yml

spring:
  # 应用基础信息
  application:
    name: Intelligent-interview-question-bank-system
  # 默认使用 local 环境，可通过 SPRING_PROFILES_ACTIVE 覆盖
  profiles:
    default: local
  # 兼容 Swagger / Knife4j 在 Spring Boot 3 下的路径匹配
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # 会话配置
  session:
    # 如需开启分布式登录，可取消下面注释并确保 Redis 配好
    # store-type: redis
    # Session 过期时间：30 天
    timeout: 2592000
  # Redis 连接池参数
  lettuce:
    pool:
      # 连接池最大连接数
      max-active: 200
      # 连接池最大阻塞等待时间（使用负值表示没有限制）
      max-wait: -1ms
      # 连接池中的最大空闲连接
      max-idle: 10
      # 连接池中的最小空闲连接
      min-idle: 0
  # 文件上传限制
  servlet:
    multipart:
      # 单个文件限制
      max-file-size: 2MB
      # 单次请求总限制
      max-request-size: 4MB

# Nacos 黑名单监听器自定义配置
nacos:
  config:
    # 远程黑名单配置文件名
    data-id: black-ip-list.yml
    # 所属分组
    group: DEFAULT_GROUP

# Web 服务基础配置
server:
  servlet:
    # 所有后端接口统一以 /api 开头
    context-path: /api
    # Session Cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# MyBatis Plus 全局行为
mybatis-plus:
  configuration:
    # false 表示严格按数据库字段名映射，不自动转驼峰
    map-underscore-to-camel-case: false
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）

# Knife4j / OpenAPI 文档元信息
knife4j:
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.xduo.springbootinit.controller
# Sa-Token 登录态与权限框架配置
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: zhimian
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录（为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: false
  # 在登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: true
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true
