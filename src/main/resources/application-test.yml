# 测试环境配置文件
# 说明：这里放测试环境连接信息、回调地址、日志级别等环境相关配置

# 测试环境服务地址
server:
  address: 0.0.0.0
  port: 8101
spring:
  # 测试环境一般关闭热重启
  devtools:
    restart:
      enabled: false
  # 测试环境数据库连接
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/my_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  # 测试环境 Redis 连接
  data:
    redis:
      database: ${REDIS_DATABASE:1}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000
      password: ${REDIS_PASSWORD:}
  # 测试环境 Elasticsearch 连接
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
  # 测试环境邮件发送配置
  mail:
    host: ${MAIL_HOST:smtp.qcloudmail.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtps
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
  # 测试环境 Spring Cloud 配置
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_DISCOVERY_SERVER_ADDR:127.0.0.1:8848}
      config:
        server-addr: ${NACOS_CONFIG_SERVER_ADDR:127.0.0.1:8848}
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            refresh: true
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8138}
  # 测试环境远程配置导入
  config:
    import:
      - optional:nacos:Intelligent-interview-question-bank-system.yml

# 测试环境 SQL 日志策略
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 测试环境黑名单配置来源
nacos:
  config:
    data-id: ${NACOS_BLACKLIST_DATA_ID:black-ip-list.yml}
    group: ${NACOS_BLACKLIST_GROUP:DEFAULT_GROUP}

# 测试环境 COS 配置
cos:
  client:
    accessKey: ${COS_ACCESS_KEY:xxx}
    secretKey: ${COS_SECRET_KEY:xxx}
    region: ${COS_REGION:ap-beijing}
    bucket: ${COS_BUCKET:xxx}

# 测试环境接口文档开关
knife4j:
  enable: ${KNIFE4J_ENABLE:true}

# 测试环境短信配置
tencent:
  sms:
    secretId: ${TENCENT_SMS_SECRET_ID:}
    secretKey: ${TENCENT_SMS_SECRET_KEY:}
    sdkAppId: ${TENCENT_SMS_SDK_APP_ID:}
    signName: ${TENCENT_SMS_SIGN_NAME:智面平台}
    templateId: ${TENCENT_SMS_TEMPLATE_ID:}
    region: ${TENCENT_SMS_REGION:ap-guangzhou}
    countryCode: ${TENCENT_SMS_COUNTRY_CODE:+86}

# 测试环境第三方登录配置
social:
  github:
    id: ${GITHUB_CLIENT_ID:}
    secret: ${GITHUB_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_REDIRECT_URI:}
  gitee:
    id: ${GITEE_CLIENT_ID:}
    secret: ${GITEE_CLIENT_SECRET:}
    redirect-uri: ${GITEE_REDIRECT_URI:}
  google:
    id: ${GOOGLE_CLIENT_ID:}
    secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:}

# 测试环境 AI 配置
ai:
  api-key: ${AI_API_KEY:}
  host: ${AI_HOST:https://api.deepseek.com/v1}
  model: ${AI_MODEL:deepseek-chat}
  speech-model: ${AI_SPEECH_MODEL:whisper-1}

# 测试环境前端地址
app:
  frontend-url: ${FRONTEND_URL:}
