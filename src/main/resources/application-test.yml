# 测试环境配置文件
# 说明：
# 1. 这里只保留测试环境启动和连接 Nacos 所需的最小配置
# 2. 数据库、Redis、ES、COS、短信、邮件、OAuth、AI、前端域名等统一放到 Nacos

# 测试环境服务地址
server:
  address: 0.0.0.0
  port: 8101
spring:
  # 测试环境一般关闭热重启
  devtools:
    restart:
      enabled: false
  # 测试环境 Spring Cloud 配置
  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: ${NACOS_DISCOVERY_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_DISCOVERY_USERNAME:}
        password: ${NACOS_DISCOVERY_PASSWORD:}
      config:
        enabled: true
        server-addr: ${NACOS_CONFIG_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_CONFIG_USERNAME:}
        password: ${NACOS_CONFIG_PASSWORD:}
        file-extension: yml
        shared-configs:
          - data-id: common.yml
            refresh: true
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8138}
  # 测试环境远程配置导入
  config:
    import:
      - optional:nacos:Intelligent-interview-question-bank-system.yml

# 测试环境 SQL 日志策略
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
