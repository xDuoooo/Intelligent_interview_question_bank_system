name: Deploy Frontend

on:
  push:
    branches:
      - main
      - master
    paths:
      - "frontend/**"
      - "docker-compose.yml"
      - "deploy/nginx/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  ACR_REGISTRY: crpi-ydpr7w8k736zbt54.cn-shanghai.personal.cr.aliyuncs.com

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build And Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        shell: bash
        run: |
          for key in DEPLOY_HOST DEPLOY_PORT DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH ACR_NAMESPACE ACR_USERNAME ACR_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend build
        working-directory: frontend
        run: npm run build

      - name: Set image name
        id: image
        env:
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
        shell: bash
        run: |
          echo "name=${ACR_REGISTRY}/${ACR_NAMESPACE}/intelligent-interview-frontend" >> "$GITHUB_OUTPUT"

      - name: Set nginx image name
        id: nginx_image
        env:
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
        shell: bash
        run: |
          echo "name=${ACR_REGISTRY}/${ACR_NAMESPACE}/intelligent-interview-nginx" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          build-args: |
            API_BASE_URL=http://backend:8101

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/nginx
          file: ./deploy/nginx/Dockerfile
          push: true
          tags: |
            ${{ steps.nginx_image.outputs.name }}:latest
            ${{ steps.nginx_image.outputs.name }}:${{ github.sha }}

      - name: Prepare SSH known hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy frontend service
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          FRONTEND_IMAGE: ${{ steps.image.outputs.name }}:latest
          NGINX_IMAGE: ${{ steps.nginx_image.outputs.name }}:latest
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -se -- "$DEPLOY_PATH" "$ACR_REGISTRY" "$ACR_USERNAME" "$ACR_PASSWORD" "$FRONTEND_IMAGE" "$NGINX_IMAGE" <<'EOF'
          set -e
          DEPLOY_PATH="$1"
          ACR_REGISTRY="$2"
          ACR_USERNAME="$3"
          ACR_PASSWORD="$4"
          FRONTEND_IMAGE="$5"
          NGINX_IMAGE="$6"
          cd "$DEPLOY_PATH"
          echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin
          export FRONTEND_IMAGE
          export NGINX_IMAGE
          docker compose pull frontend nginx
          docker compose up -d --no-build --no-deps frontend nginx
          docker logout "$ACR_REGISTRY" || true
          docker image prune -f
          EOF
