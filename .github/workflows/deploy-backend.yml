name: Deploy Backend

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "Dockerfile"
      - "docker-compose.yml"
      - "docker-compose.backend.yml"
      - "deploy/nginx/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build And Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify backend build
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests compile

      - name: Set image name
        id: image
        shell: bash
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/intelligent-interview-backend" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Prepare SSH known hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend service
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKEND_IMAGE: ${{ steps.image.outputs.name }}:latest
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -se -- "$DEPLOY_PATH" "$GHCR_USERNAME" "$GHCR_TOKEN" "$BACKEND_IMAGE" <<'EOF'
          set -e
          DEPLOY_PATH="$1"
          GHCR_USERNAME="$2"
          GHCR_TOKEN="$3"
          BACKEND_IMAGE="$4"
          cd "$DEPLOY_PATH"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          export BACKEND_IMAGE
          docker compose pull backend
          docker compose up -d backend
          docker image prune -f
          EOF
