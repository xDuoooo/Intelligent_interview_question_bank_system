name: Deploy Backend

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "pom.xml"
      - ".mvn/**"
      - "mvnw"
      - "mvnw.cmd"
      - "Dockerfile"
      - "docker-compose.yml"
      - "deploy/nginx/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  ACR_REGISTRY: crpi-ydpr7w8k736zbt54.cn-shanghai.personal.cr.aliyuncs.com

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build And Deploy Backend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Validate deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        shell: bash
        run: |
          for key in DEPLOY_HOST DEPLOY_PORT DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH ACR_NAMESPACE ACR_USERNAME ACR_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: $key"
              exit 1
            fi
          done

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Verify backend build
        run: ./mvnw --batch-mode --no-transfer-progress -DskipTests compile

      - name: Set image name
        id: image
        env:
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
        shell: bash
        run: |
          echo "name=${ACR_REGISTRY}/${ACR_NAMESPACE}/intelligent-interview-backend" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Prepare SSH known hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy backend service
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          ACR_REGISTRY: ${{ env.ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          BACKEND_IMAGE: ${{ steps.image.outputs.name }}:latest
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            bash -se -- "$DEPLOY_PATH" "$ACR_REGISTRY" "$ACR_USERNAME" "$ACR_PASSWORD" "$BACKEND_IMAGE" <<'EOF'
          set -e
          DEPLOY_PATH="$1"
          ACR_REGISTRY="$2"
          ACR_USERNAME="$3"
          ACR_PASSWORD="$4"
          BACKEND_IMAGE="$5"
          cd "$DEPLOY_PATH"
          echo "$ACR_PASSWORD" | docker login "$ACR_REGISTRY" -u "$ACR_USERNAME" --password-stdin
          export BACKEND_IMAGE
          docker compose pull backend
          docker compose up -d --no-build --no-deps backend
          docker logout "$ACR_REGISTRY" || true
          docker image prune -f
          EOF
