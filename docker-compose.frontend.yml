services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8101}
    image: ${FRONTEND_IMAGE:-intelligent-interview-frontend:latest}
    container_name: intelligent-interview-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8101}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
