services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-intelligent-interview-backend:latest}
    container_name: intelligent-interview-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8101}:8101"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_DISCOVERY_SERVER_ADDR: ${NACOS_DISCOVERY_SERVER_ADDR}
      NACOS_DISCOVERY_USERNAME: ${NACOS_DISCOVERY_USERNAME:-}
      NACOS_DISCOVERY_PASSWORD: ${NACOS_DISCOVERY_PASSWORD:-}
      NACOS_CONFIG_SERVER_ADDR: ${NACOS_CONFIG_SERVER_ADDR}
      NACOS_CONFIG_USERNAME: ${NACOS_CONFIG_USERNAME:-}
      NACOS_CONFIG_PASSWORD: ${NACOS_CONFIG_PASSWORD:-}
      SENTINEL_DASHBOARD: ${SENTINEL_DASHBOARD:-}
    volumes:
      - uploads-data:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  uploads-data:
