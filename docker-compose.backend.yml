services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: intelligent-interview-backend:latest
    container_name: intelligent-interview-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8101}:8101"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE:-1}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_USERNAME: ${REDIS_USERNAME:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ES_URIS: ${ES_URIS}
      ES_USERNAME: ${ES_USERNAME:-}
      ES_PASSWORD: ${ES_PASSWORD:-}
      TENCENT_EMAIL_SECRET_ID: ${TENCENT_EMAIL_SECRET_ID:-}
      TENCENT_EMAIL_SECRET_KEY: ${TENCENT_EMAIL_SECRET_KEY:-}
      TENCENT_EMAIL_REGION: ${TENCENT_EMAIL_REGION:-ap-guangzhou}
      TENCENT_EMAIL_FROM_ADDRESS: ${TENCENT_EMAIL_FROM_ADDRESS:-}
      TENCENT_EMAIL_REPLY_TO: ${TENCENT_EMAIL_REPLY_TO:-}
      TENCENT_EMAIL_VERIFICATION_TEMPLATE_ID: ${TENCENT_EMAIL_VERIFICATION_TEMPLATE_ID:-}
      TENCENT_EMAIL_LEARNING_REMINDER_TEMPLATE_ID: ${TENCENT_EMAIL_LEARNING_REMINDER_TEMPLATE_ID:-}
      COS_ACCESS_KEY: ${COS_ACCESS_KEY:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_REGION: ${COS_REGION:-ap-beijing}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_HOST: ${COS_HOST:-}
      ALIYUN_SMS_ACCESS_KEY_ID: ${ALIYUN_SMS_ACCESS_KEY_ID:-}
      ALIYUN_SMS_ACCESS_KEY_SECRET: ${ALIYUN_SMS_ACCESS_KEY_SECRET:-}
      ALIYUN_SMS_ENDPOINT: ${ALIYUN_SMS_ENDPOINT:-dypnsapi.aliyuncs.com}
      ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME:-}
      ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE:-}
      ALIYUN_SMS_SCHEME_NAME: ${ALIYUN_SMS_SCHEME_NAME:-}
      ALIYUN_SMS_COUNTRY_CODE: ${ALIYUN_SMS_COUNTRY_CODE:-86}
      ALIYUN_SMS_CODE_LENGTH: ${ALIYUN_SMS_CODE_LENGTH:-6}
      ALIYUN_SMS_VALID_TIME_SECONDS: ${ALIYUN_SMS_VALID_TIME_SECONDS:-300}
      ALIYUN_SMS_INTERVAL_SECONDS: ${ALIYUN_SMS_INTERVAL_SECONDS:-60}
      ALIYUN_SMS_CODE_TYPE: ${ALIYUN_SMS_CODE_TYPE:-1}
      ALIYUN_SMS_DUPLICATE_POLICY: ${ALIYUN_SMS_DUPLICATE_POLICY:-1}
      ALIYUN_SMS_CASE_AUTH_POLICY: ${ALIYUN_SMS_CASE_AUTH_POLICY:-1}
      ALIYUN_SMS_CODE_PARAM_NAME: ${ALIYUN_SMS_CODE_PARAM_NAME:-code}
      ALIYUN_SMS_VALID_TIME_PARAM_NAME: ${ALIYUN_SMS_VALID_TIME_PARAM_NAME:-min}
      ALIYUN_SMS_CODE_PLACEHOLDER: ${ALIYUN_SMS_CODE_PLACEHOLDER:-##code##}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      GITEE_CLIENT_ID: ${GITEE_CLIENT_ID:-}
      GITEE_CLIENT_SECRET: ${GITEE_CLIENT_SECRET:-}
      GITEE_REDIRECT_URI: ${GITEE_REDIRECT_URI:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      WECHAT_MP_ENABLED: ${WECHAT_MP_ENABLED:-false}
      WECHAT_MP_TOKEN: ${WECHAT_MP_TOKEN:-}
      WECHAT_MP_ACCOUNT_NAME: ${WECHAT_MP_ACCOUNT_NAME:-}
      WECHAT_MP_QR_IMAGE_URL: ${WECHAT_MP_QR_IMAGE_URL:-}
      WECHAT_MP_LOGIN_KEYWORD: ${WECHAT_MP_LOGIN_KEYWORD:-登录}
      WECHAT_MP_TICKET_EXPIRE_SECONDS: ${WECHAT_MP_TICKET_EXPIRE_SECONDS:-600}
      WECHAT_MP_CODE_EXPIRE_SECONDS: ${WECHAT_MP_CODE_EXPIRE_SECONDS:-300}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_HOST: ${AI_HOST:-https://api.deepseek.com/v1}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_SPEECH_MODEL: ${AI_SPEECH_MODEL:-whisper-1}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-${FRONTEND_URL}}
      APP_SMS_MOCK_ENABLED: ${APP_SMS_MOCK_ENABLED:-false}
      APP_EMAIL_MOCK_ENABLED: ${APP_EMAIL_MOCK_ENABLED:-false}
      APP_UPLOAD_LOCAL_FALLBACK_ENABLED: ${APP_UPLOAD_LOCAL_FALLBACK_ENABLED:-true}
      APP_UPLOAD_LOCAL_DIR: /app/uploads
      KNIFE4J_ENABLE: ${KNIFE4J_ENABLE:-false}
      KNIFE4J_BASIC_ENABLE: ${KNIFE4J_BASIC_ENABLE:-false}
      KNIFE4J_USERNAME: ${KNIFE4J_USERNAME:-}
      KNIFE4J_PASSWORD: ${KNIFE4J_PASSWORD:-}
    volumes:
      - uploads-data:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  uploads-data:
