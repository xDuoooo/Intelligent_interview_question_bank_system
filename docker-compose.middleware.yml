services:
  mysql:
    image: mysql:8.0
    container_name: intelligent-interview-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=120
      - --innodb_buffer_pool_size=256M
      - --innodb_log_file_size=64M
      - --tmp_table_size=32M
      - --max_heap_table_size=32M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-Intelligent_interview_question_bank_system}
      MYSQL_USER: ${MYSQL_USER:-zhimian}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    mem_limit: 640m

  redis:
    image: redis:7-alpine
    container_name: intelligent-interview-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - yes
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --requirepass
      - ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    mem_limit: 256m

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: intelligent-interview-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      xpack.ml.enabled: "false"
      ingest.geoip.downloader.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      TZ: Asia/Shanghai
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    mem_limit: 1024m

  nacos:
    image: nacos/nacos-server:v2.3.1-slim
    container_name: intelligent-interview-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
      PREFER_HOST_MODE: hostname
      TZ: Asia/Shanghai
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_RPC_PORT:-9848}:9848"
      - "${NACOS_RAFT_PORT:-9849}:9849"
    mem_limit: 512m

  sentinel:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: intelligent-interview-sentinel
    restart: unless-stopped
    environment:
      JAVA_OPTS: -Dserver.port=8080 -Dcsp.sentinel.dashboard.server=localhost:8080 -Dproject.name=sentinel-dashboard -Xms192m -Xmx192m
      TZ: Asia/Shanghai
    ports:
      - "${SENTINEL_PORT:-8138}:8080"
    mem_limit: 320m

volumes:
  mysql-data:
  redis-data:
  es-data:
